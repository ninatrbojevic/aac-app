@if (!isLoginPage) {
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="hamburger" (click)="toggleSidebar()">
        <i class="pi pi-bars"></i>
      </button>
      <span class="app-title">AAC Sustav</span>
    </div>
    <div class="user-info">
      <i class="pi pi-user"></i>
      <span>{{ korisnik.uloga }}</span>
    </div>
  </div>

  <div class="overlay" [class.open]="sidebarOpen" (click)="toggleSidebar()"></div>

  <div class="drawer" [class.open]="sidebarOpen">
    <div class="drawer-header">
      <span class="drawer-title">Izbornik</span>
      <button class="close-btn" (click)="toggleSidebar()">
        <i class="pi pi-times"></i>
      </button>
    </div>
    <nav class="nav-links">
      <a href="#"><i class="pi pi-home"></i><span>Početna</span></a>
      <a href="#"><i class="pi pi-calendar"></i><span>Pregled događaja</span></a>
      <a href="#"><i class="pi pi-list"></i><span>Moje prijave</span></a>
      <a href="#"><i class="pi pi-file"></i><span>Digitizirani sadržaj</span></a>
      <a href="#"><i class="pi pi-check-circle"></i><span>Potvrde</span></a>
      <a href="#"><i class="pi pi-cog"></i><span>Postavke</span></a>
    </nav>
  </div>
}

<main class="content">
  <router-outlet />
</main>
